name: Quality Gate

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm ci --prefix apps/customer-app
          npm ci --prefix apps/worker-app

      - name: Run Quality Gate
        run: npm run verify:all
