name: App CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  app-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint:repo
      - run: npm run typecheck:worker
      - run: npm run typecheck:customer
